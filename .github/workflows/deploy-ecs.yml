      DRIVER_VEHICLE_ASSIGNMENT_IMAGE_URI: ${{ vars.DRIVER_VEHICLE_ASSIGNMENT_IMAGE_URI }}
      DISPATCH_REGISTRY_IMAGE_URI: ${{ vars.DISPATCH_REGISTRY_IMAGE_URI }}
      DELIVERY_RECORD_IMAGE_URI: ${{ vars.DELIVERY_RECORD_IMAGE_URI }}
      ATTENDANCE_REGISTRY_IMAGE_URI: ${{ vars.ATTENDANCE_REGISTRY_IMAGE_URI }}
      DISPATCH_OPS_IMAGE_URI: ${{ vars.DISPATCH_OPS_IMAGE_URI }}
      DRIVER_OPS_IMAGE_URI: ${{ vars.DRIVER_OPS_IMAGE_URI }}
      VEHICLE_OPS_IMAGE_URI: ${{ vars.VEHICLE_OPS_IMAGE_URI }}
      SETTLEMENT_REGISTRY_IMAGE_URI: ${{ vars.SETTLEMENT_REGISTRY_IMAGE_URI }}
      SETTLEMENT_PAYROLL_IMAGE_URI: ${{ vars.SETTLEMENT_PAYROLL_IMAGE_URI }}
      SETTLEMENT_OPS_IMAGE_URI: ${{ vars.SETTLEMENT_OPS_IMAGE_URI }}
      REGION_REGISTRY_IMAGE_URI: ${{ vars.REGION_REGISTRY_IMAGE_URI }}
      REGION_ANALYTICS_IMAGE_URI: ${{ vars.REGION_ANALYTICS_IMAGE_URI }}
      ANNOUNCEMENT_REGISTRY_IMAGE_URI: ${{ vars.ANNOUNCEMENT_REGISTRY_IMAGE_URI }}
      SUPPORT_REGISTRY_IMAGE_URI: ${{ vars.SUPPORT_REGISTRY_IMAGE_URI }}
      NOTIFICATION_HUB_IMAGE_URI: ${{ vars.NOTIFICATION_HUB_IMAGE_URI }}
      TERMINAL_REGISTRY_IMAGE_URI: ${{ vars.TERMINAL_REGISTRY_IMAGE_URI }}
      TELEMETRY_HUB_IMAGE_URI: ${{ vars.TELEMETRY_HUB_IMAGE_URI }}
      TELEMETRY_DEAD_LETTER_IMAGE_URI: ${{ vars.TELEMETRY_DEAD_LETTER_IMAGE_URI }}
      TELEMETRY_LISTENER_IMAGE_URI: ${{ vars.TELEMETRY_LISTENER_IMAGE_URI }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ env.INFRA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          allowed-account-ids: 902837199612
          role-session-name: ev-dashboard-runtime-infra-${{ github.run_id }}
          mask-aws-account-id: true
          unset-current-credentials: true
          retry-max-attempts: 4
          action-timeout-s: 120

      - name: Run preflight gate
        if: ${{ env.RUN_PROFILE == 'full' || env.RUN_PROFILE == 'incremental-expand' || env.RUN_PROFILE == 'warm-host-partial' }}
        run: npm run preflight

      - name: Run unit tests
        if: ${{ env.RUN_PROFILE == 'full' }}
        run: npm test -- --runInBand

      - name: Preview release manifest
        if: ${{ env.RUN_PROFILE == 'warm-host-partial' }}
        run: npx ts-node bin/previewReleaseManifest.ts "$RELEASE_MANIFEST_PATH"

      - name: Synthesize stack
        if: ${{ env.RUN_PROFILE == 'full' || env.RUN_PROFILE == 'bootstrap-proof' || env.RUN_PROFILE == 'incremental-expand' }}
        run: npx cdk synth

      - name: Write operator summary
        run: |
          cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          ## Deploy operator loop

          - Run profile: `${{ env.RUN_PROFILE }}`
          - `full`: preflight -> unit tests -> synth -> deploy -> smoke
          - `bootstrap-proof`: synth -> deploy -> smoke
          - `incremental-expand`: synth -> deploy -> smoke on the current cumulative service set
          - `warm-host-partial`: preview -> preflight -> wave reconcile -> smoke on an existing base stack
          - `smoke-only`: smoke only on the current live lane
          - Typical runtime verification deploy: about `10-20m`
          - Wait phases: `CloudFormation start -> EC2 launch -> user-data/bootstrap -> ALB target healthy -> public smoke`
          - `502` before the app host is healthy usually means `wait`
          - `502` after the app host is healthy usually means `check gateway/bootstrap logs before retry`
          - Protected route `401` is often the first honest proof that the route is alive
          - Warm-host partial keeps the base stack and app host alive; it only runs manifest-listed waves through SSM
          - Post-deploy public smoke runs after the active deploy path and fails this job if the public edge still answers incorrectly
          - A deploy is only done when the GitHub run is `success`, the stack is `UPDATE_COMPLETE`, and the public smoke passes

          Runbook: `/Users/jiin/Documents/Files/02_EVnSolution/00_Source_code/CLEVER/clever-msa-platform/docs/runbooks/ev-dashboard-ecs-deploy-operator-loop.md`
          EOF

      - name: Deploy stack
        if: ${{ env.RUN_PROFILE == 'full' || env.RUN_PROFILE == 'bootstrap-proof' || env.RUN_PROFILE == 'incremental-expand' }}
        run: npx cdk deploy --require-approval never

      - name: Run warm-host partial reconcile waves
        if: ${{ env.RUN_PROFILE == 'warm-host-partial' }}
        run: npm run reconcile:waves -- "$RELEASE_MANIFEST_PATH"

      - name: Run post-deploy public smoke
        run: |
          set -o pipefail
          npm run smoke:postdeploy | tee -a "$GITHUB_STEP_SUMMARY"
