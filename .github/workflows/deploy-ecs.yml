name: Deploy ev-dashboard runtime platform

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: Target environment
        required: true
        default: dev
        options:
          - dev
          - stage
          - prod
      run_profile:
        type: choice
        description: Deployment verification profile
        required: true
        default: full
        options:
          - full
          - bootstrap-proof
          - incremental-expand
          - warm-host-partial
          - smoke-only
      release_manifest_path:
        type: string
        description: Repo-relative release manifest path for warm-host-partial runs
        required: false

permissions:
  id-token: write
  contents: read

concurrency:
  group: ev-dashboard-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    env:
      DEPLOY_ENVIRONMENT: ${{ github.event.inputs.environment }}
      BACKEND_GUNICORN_WORKERS: ${{ vars.BACKEND_GUNICORN_WORKERS }}
      RUN_PROFILE: ${{ github.event.inputs.run_profile }}
      RELEASE_MANIFEST_PATH: ${{ github.event.inputs.release_manifest_path }}
      RUNTIME_MODE: ec2
      INFRA_ROLE_ARN: ${{ secrets.GH_ACTIONS_INFRA_ROLE_ARN }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      HOSTED_ZONE_ID: ${{ vars.HOSTED_ZONE_ID }}
      HOSTED_ZONE_NAME: ${{ vars.HOSTED_ZONE_NAME }}
      APEX_DOMAIN: ${{ vars.APEX_DOMAIN }}
      API_DOMAIN: ${{ vars.API_DOMAIN }}
      COCKPIT_HOSTS: ${{ vars.COCKPIT_HOSTS }}
      VPC_ID: ${{ vars.VPC_ID }}
      PUBLIC_SUBNET_IDS: ${{ vars.PUBLIC_SUBNET_IDS }}
      PRIVATE_SUBNET_IDS: ${{ vars.PRIVATE_SUBNET_IDS }}
      AVAILABILITY_ZONES: ${{ vars.AVAILABILITY_ZONES }}
      APP_HOST_SUBNET_ID: ${{ vars.APP_HOST_SUBNET_ID }}
