      TELEMETRY_HUB_BASE_URL: ${{ vars.TELEMETRY_HUB_BASE_URL }}
      TERMINAL_REGISTRY_BASE_URL: ${{ vars.TERMINAL_REGISTRY_BASE_URL }}
      TELEMETRY_LISTENER_MQTT_HOST: ${{ vars.TELEMETRY_LISTENER_MQTT_HOST }}
      TELEMETRY_LISTENER_MQTT_PORT: ${{ vars.TELEMETRY_LISTENER_MQTT_PORT }}
