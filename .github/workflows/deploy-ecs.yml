name: Deploy ev-dashboard ECS platform

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: Target environment
        required: true
        default: dev
        options:
          - dev
          - stage
          - prod
      front_image_uri:
        type: string
        description: Full ECR image URI for front-web-console
        required: true
      gateway_image_uri:
        type: string
        description: Full ECR image URI for edge-api-gateway
        required: true
      account_access_image_uri:
        type: string
        description: Full ECR image URI for service-account-access
        required: true
      organization_image_uri:
        type: string
        description: Full ECR image URI for service-organization-registry
        required: true
      driver_profile_image_uri:
        type: string
        description: Full ECR image URI for service-driver-profile
        required: true
      personnel_document_image_uri:
        type: string
        description: Full ECR image URI for service-personnel-document-registry
        required: true
      vehicle_asset_image_uri:
        type: string
        description: Full ECR image URI for service-vehicle-registry
        required: true
      driver_vehicle_assignment_image_uri:
        type: string
        description: Full ECR image URI for service-vehicle-assignment
        required: true
      dispatch_registry_image_uri:
        type: string
        description: Full ECR image URI for service-dispatch-registry
        required: true
      delivery_record_image_uri:
        type: string
        description: Full ECR image URI for service-delivery-record
        required: true
      attendance_registry_image_uri:
        type: string
        description: Full ECR image URI for service-attendance-registry
        required: true
      dispatch_ops_image_uri:
        type: string
        description: Full ECR image URI for service-dispatch-operations-view
        required: true
      driver_ops_image_uri:
        type: string
        description: Full ECR image URI for service-driver-operations-view
        required: true
      vehicle_ops_image_uri:
        type: string
        description: Full ECR image URI for service-vehicle-operations-view
        required: true
      settlement_registry_image_uri:
        type: string
        description: Full ECR image URI for service-settlement-registry
        required: true
      settlement_payroll_image_uri:
        type: string
        description: Full ECR image URI for service-settlement-payroll
        required: true
      settlement_ops_image_uri:
        type: string
        description: Full ECR image URI for service-settlement-operations-view
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    env:
      DEPLOY_ENVIRONMENT: ${{ github.event.inputs.environment }}
      INFRA_ROLE_ARN: ${{ secrets.GH_ACTIONS_INFRA_ROLE_ARN }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      HOSTED_ZONE_ID: ${{ vars.HOSTED_ZONE_ID }}
      HOSTED_ZONE_NAME: ${{ vars.HOSTED_ZONE_NAME }}
      APEX_DOMAIN: ${{ vars.APEX_DOMAIN }}
      API_DOMAIN: ${{ vars.API_DOMAIN }}
      VPC_ID: ${{ vars.VPC_ID }}
      PUBLIC_SUBNET_IDS: ${{ vars.PUBLIC_SUBNET_IDS }}
      PRIVATE_SUBNET_IDS: ${{ vars.PRIVATE_SUBNET_IDS }}
      AVAILABILITY_ZONES: ${{ vars.AVAILABILITY_ZONES }}
      SERVICE_CONNECT_NAMESPACE: ${{ vars.SERVICE_CONNECT_NAMESPACE }}
      FRONT_DESIRED_COUNT: ${{ vars.FRONT_DESIRED_COUNT }}
      GATEWAY_DESIRED_COUNT: ${{ vars.GATEWAY_DESIRED_COUNT }}
      ACCOUNT_ACCESS_DESIRED_COUNT: ${{ vars.ACCOUNT_ACCESS_DESIRED_COUNT }}
      ORGANIZATION_DESIRED_COUNT: ${{ vars.ORGANIZATION_DESIRED_COUNT }}
      DRIVER_PROFILE_DESIRED_COUNT: ${{ vars.DRIVER_PROFILE_DESIRED_COUNT }}
      PERSONNEL_DOCUMENT_DESIRED_COUNT: ${{ vars.PERSONNEL_DOCUMENT_DESIRED_COUNT }}
      VEHICLE_ASSET_DESIRED_COUNT: ${{ vars.VEHICLE_ASSET_DESIRED_COUNT }}
      DRIVER_VEHICLE_ASSIGNMENT_DESIRED_COUNT: ${{ vars.DRIVER_VEHICLE_ASSIGNMENT_DESIRED_COUNT }}
      DISPATCH_REGISTRY_DESIRED_COUNT: ${{ vars.DISPATCH_REGISTRY_DESIRED_COUNT }}
      DELIVERY_RECORD_DESIRED_COUNT: ${{ vars.DELIVERY_RECORD_DESIRED_COUNT }}
      ATTENDANCE_REGISTRY_DESIRED_COUNT: ${{ vars.ATTENDANCE_REGISTRY_DESIRED_COUNT }}
      DISPATCH_OPS_DESIRED_COUNT: ${{ vars.DISPATCH_OPS_DESIRED_COUNT }}
      DRIVER_OPS_DESIRED_COUNT: ${{ vars.DRIVER_OPS_DESIRED_COUNT }}
      VEHICLE_OPS_DESIRED_COUNT: ${{ vars.VEHICLE_OPS_DESIRED_COUNT }}
      SETTLEMENT_REGISTRY_DESIRED_COUNT: ${{ vars.SETTLEMENT_REGISTRY_DESIRED_COUNT }}
      SETTLEMENT_PAYROLL_DESIRED_COUNT: ${{ vars.SETTLEMENT_PAYROLL_DESIRED_COUNT }}
      SETTLEMENT_OPS_DESIRED_COUNT: ${{ vars.SETTLEMENT_OPS_DESIRED_COUNT }}
      FRONT_CPU: ${{ vars.FRONT_CPU }}
      FRONT_MEMORY_MIB: ${{ vars.FRONT_MEMORY_MIB }}
      GATEWAY_CPU: ${{ vars.GATEWAY_CPU }}
      GATEWAY_MEMORY_MIB: ${{ vars.GATEWAY_MEMORY_MIB }}
      ACCOUNT_ACCESS_CPU: ${{ vars.ACCOUNT_ACCESS_CPU }}
      ACCOUNT_ACCESS_MEMORY_MIB: ${{ vars.ACCOUNT_ACCESS_MEMORY_MIB }}
      ORGANIZATION_CPU: ${{ vars.ORGANIZATION_CPU }}
      ORGANIZATION_MEMORY_MIB: ${{ vars.ORGANIZATION_MEMORY_MIB }}
      DRIVER_PROFILE_CPU: ${{ vars.DRIVER_PROFILE_CPU }}
      DRIVER_PROFILE_MEMORY_MIB: ${{ vars.DRIVER_PROFILE_MEMORY_MIB }}
      PERSONNEL_DOCUMENT_CPU: ${{ vars.PERSONNEL_DOCUMENT_CPU }}
      PERSONNEL_DOCUMENT_MEMORY_MIB: ${{ vars.PERSONNEL_DOCUMENT_MEMORY_MIB }}
      VEHICLE_ASSET_CPU: ${{ vars.VEHICLE_ASSET_CPU }}
      VEHICLE_ASSET_MEMORY_MIB: ${{ vars.VEHICLE_ASSET_MEMORY_MIB }}
      DRIVER_VEHICLE_ASSIGNMENT_CPU: ${{ vars.DRIVER_VEHICLE_ASSIGNMENT_CPU }}
      DRIVER_VEHICLE_ASSIGNMENT_MEMORY_MIB: ${{ vars.DRIVER_VEHICLE_ASSIGNMENT_MEMORY_MIB }}
      DISPATCH_REGISTRY_CPU: ${{ vars.DISPATCH_REGISTRY_CPU }}
      DISPATCH_REGISTRY_MEMORY_MIB: ${{ vars.DISPATCH_REGISTRY_MEMORY_MIB }}
      DELIVERY_RECORD_CPU: ${{ vars.DELIVERY_RECORD_CPU }}
      DELIVERY_RECORD_MEMORY_MIB: ${{ vars.DELIVERY_RECORD_MEMORY_MIB }}
      ATTENDANCE_REGISTRY_CPU: ${{ vars.ATTENDANCE_REGISTRY_CPU }}
      ATTENDANCE_REGISTRY_MEMORY_MIB: ${{ vars.ATTENDANCE_REGISTRY_MEMORY_MIB }}
      DISPATCH_OPS_CPU: ${{ vars.DISPATCH_OPS_CPU }}
      DISPATCH_OPS_MEMORY_MIB: ${{ vars.DISPATCH_OPS_MEMORY_MIB }}
      DRIVER_OPS_CPU: ${{ vars.DRIVER_OPS_CPU }}
      DRIVER_OPS_MEMORY_MIB: ${{ vars.DRIVER_OPS_MEMORY_MIB }}
      VEHICLE_OPS_CPU: ${{ vars.VEHICLE_OPS_CPU }}
      VEHICLE_OPS_MEMORY_MIB: ${{ vars.VEHICLE_OPS_MEMORY_MIB }}
      SETTLEMENT_REGISTRY_CPU: ${{ vars.SETTLEMENT_REGISTRY_CPU }}
      SETTLEMENT_REGISTRY_MEMORY_MIB: ${{ vars.SETTLEMENT_REGISTRY_MEMORY_MIB }}
      SETTLEMENT_PAYROLL_CPU: ${{ vars.SETTLEMENT_PAYROLL_CPU }}
      SETTLEMENT_PAYROLL_MEMORY_MIB: ${{ vars.SETTLEMENT_PAYROLL_MEMORY_MIB }}
      SETTLEMENT_OPS_CPU: ${{ vars.SETTLEMENT_OPS_CPU }}
      SETTLEMENT_OPS_MEMORY_MIB: ${{ vars.SETTLEMENT_OPS_MEMORY_MIB }}
      FRONT_HEALTH_CHECK_PATH: ${{ vars.FRONT_HEALTH_CHECK_PATH }}
      GATEWAY_HEALTH_CHECK_PATH: ${{ vars.GATEWAY_HEALTH_CHECK_PATH }}
      ACCOUNT_ACCESS_HEALTH_CHECK_PATH: ${{ vars.ACCOUNT_ACCESS_HEALTH_CHECK_PATH }}
      ORGANIZATION_HEALTH_CHECK_PATH: ${{ vars.ORGANIZATION_HEALTH_CHECK_PATH }}
      DRIVER_PROFILE_HEALTH_CHECK_PATH: ${{ vars.DRIVER_PROFILE_HEALTH_CHECK_PATH }}
      PERSONNEL_DOCUMENT_HEALTH_CHECK_PATH: ${{ vars.PERSONNEL_DOCUMENT_HEALTH_CHECK_PATH }}
      VEHICLE_ASSET_HEALTH_CHECK_PATH: ${{ vars.VEHICLE_ASSET_HEALTH_CHECK_PATH }}
      DRIVER_VEHICLE_ASSIGNMENT_HEALTH_CHECK_PATH: ${{ vars.DRIVER_VEHICLE_ASSIGNMENT_HEALTH_CHECK_PATH }}
      DISPATCH_REGISTRY_HEALTH_CHECK_PATH: ${{ vars.DISPATCH_REGISTRY_HEALTH_CHECK_PATH }}
      DELIVERY_RECORD_HEALTH_CHECK_PATH: ${{ vars.DELIVERY_RECORD_HEALTH_CHECK_PATH }}
      ATTENDANCE_REGISTRY_HEALTH_CHECK_PATH: ${{ vars.ATTENDANCE_REGISTRY_HEALTH_CHECK_PATH }}
      DISPATCH_OPS_HEALTH_CHECK_PATH: ${{ vars.DISPATCH_OPS_HEALTH_CHECK_PATH }}
      DRIVER_OPS_HEALTH_CHECK_PATH: ${{ vars.DRIVER_OPS_HEALTH_CHECK_PATH }}
      VEHICLE_OPS_HEALTH_CHECK_PATH: ${{ vars.VEHICLE_OPS_HEALTH_CHECK_PATH }}
      SETTLEMENT_REGISTRY_HEALTH_CHECK_PATH: ${{ vars.SETTLEMENT_REGISTRY_HEALTH_CHECK_PATH }}
      SETTLEMENT_PAYROLL_HEALTH_CHECK_PATH: ${{ vars.SETTLEMENT_PAYROLL_HEALTH_CHECK_PATH }}
      SETTLEMENT_OPS_HEALTH_CHECK_PATH: ${{ vars.SETTLEMENT_OPS_HEALTH_CHECK_PATH }}
      SETTLEMENT_OPS_BASE_URL: ${{ vars.SETTLEMENT_OPS_BASE_URL }}
      TELEMETRY_HUB_BASE_URL: ${{ vars.TELEMETRY_HUB_BASE_URL }}
      TERMINAL_REGISTRY_BASE_URL: ${{ vars.TERMINAL_REGISTRY_BASE_URL }}
      FRONT_IMAGE_URI: ${{ github.event.inputs.front_image_uri }}
      GATEWAY_IMAGE_URI: ${{ github.event.inputs.gateway_image_uri }}
      ACCOUNT_ACCESS_IMAGE_URI: ${{ github.event.inputs.account_access_image_uri }}
      ORGANIZATION_IMAGE_URI: ${{ github.event.inputs.organization_image_uri }}
      DRIVER_PROFILE_IMAGE_URI: ${{ github.event.inputs.driver_profile_image_uri }}
      PERSONNEL_DOCUMENT_IMAGE_URI: ${{ github.event.inputs.personnel_document_image_uri }}
      VEHICLE_ASSET_IMAGE_URI: ${{ github.event.inputs.vehicle_asset_image_uri }}
      DRIVER_VEHICLE_ASSIGNMENT_IMAGE_URI: ${{ github.event.inputs.driver_vehicle_assignment_image_uri }}
      DISPATCH_REGISTRY_IMAGE_URI: ${{ github.event.inputs.dispatch_registry_image_uri }}
      DELIVERY_RECORD_IMAGE_URI: ${{ github.event.inputs.delivery_record_image_uri }}
      ATTENDANCE_REGISTRY_IMAGE_URI: ${{ github.event.inputs.attendance_registry_image_uri }}
      DISPATCH_OPS_IMAGE_URI: ${{ github.event.inputs.dispatch_ops_image_uri }}
      DRIVER_OPS_IMAGE_URI: ${{ github.event.inputs.driver_ops_image_uri }}
      VEHICLE_OPS_IMAGE_URI: ${{ github.event.inputs.vehicle_ops_image_uri }}
      SETTLEMENT_REGISTRY_IMAGE_URI: ${{ github.event.inputs.settlement_registry_image_uri }}
      SETTLEMENT_PAYROLL_IMAGE_URI: ${{ github.event.inputs.settlement_payroll_image_uri }}
      SETTLEMENT_OPS_IMAGE_URI: ${{ github.event.inputs.settlement_ops_image_uri }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ env.INFRA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          allowed-account-ids: 902837199612
          role-session-name: ev-dashboard-ecs-infra-${{ github.run_id }}
          mask-aws-account-id: true
          unset-current-credentials: true
          retry-max-attempts: 4
          action-timeout-s: 120

      - name: Run preflight gate
        run: npm run preflight

      - name: Run unit tests
        run: npm test -- --runInBand

      - name: Synthesize stack
        run: npx cdk synth

      - name: Deploy stack
        run: npx cdk deploy --require-approval never
