name: Deploy ev-dashboard ECS platform

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: Target environment
        required: true
        default: dev
        options:
          - dev
          - stage
          - prod
      front_image_uri:
        type: string
        description: Full ECR image URI for front-web-console
        required: true
      gateway_image_uri:
        type: string
        description: Full ECR image URI for edge-api-gateway
        required: true
      account_access_image_uri:
        type: string
        description: Full ECR image URI for service-account-access
        required: true
      organization_image_uri:
        type: string
        description: Full ECR image URI for service-organization-registry
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    env:
      INFRA_ROLE_ARN: ${{ secrets.GH_ACTIONS_INFRA_ROLE_ARN }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      HOSTED_ZONE_ID: ${{ vars.HOSTED_ZONE_ID }}
      HOSTED_ZONE_NAME: ${{ vars.HOSTED_ZONE_NAME }}
      APEX_DOMAIN: ${{ vars.APEX_DOMAIN }}
      API_DOMAIN: ${{ vars.API_DOMAIN }}
      VPC_ID: ${{ vars.VPC_ID }}
      PUBLIC_SUBNET_IDS: ${{ vars.PUBLIC_SUBNET_IDS }}
      PRIVATE_SUBNET_IDS: ${{ vars.PRIVATE_SUBNET_IDS }}
      AVAILABILITY_ZONES: ${{ vars.AVAILABILITY_ZONES }}
      SERVICE_CONNECT_NAMESPACE: ${{ vars.SERVICE_CONNECT_NAMESPACE }}
      FRONT_DESIRED_COUNT: ${{ vars.FRONT_DESIRED_COUNT }}
      GATEWAY_DESIRED_COUNT: ${{ vars.GATEWAY_DESIRED_COUNT }}
      ACCOUNT_ACCESS_DESIRED_COUNT: ${{ vars.ACCOUNT_ACCESS_DESIRED_COUNT }}
      ORGANIZATION_DESIRED_COUNT: ${{ vars.ORGANIZATION_DESIRED_COUNT }}
      FRONT_CPU: ${{ vars.FRONT_CPU }}
      FRONT_MEMORY_MIB: ${{ vars.FRONT_MEMORY_MIB }}
      GATEWAY_CPU: ${{ vars.GATEWAY_CPU }}
      GATEWAY_MEMORY_MIB: ${{ vars.GATEWAY_MEMORY_MIB }}
      ACCOUNT_ACCESS_CPU: ${{ vars.ACCOUNT_ACCESS_CPU }}
      ACCOUNT_ACCESS_MEMORY_MIB: ${{ vars.ACCOUNT_ACCESS_MEMORY_MIB }}
      ORGANIZATION_CPU: ${{ vars.ORGANIZATION_CPU }}
      ORGANIZATION_MEMORY_MIB: ${{ vars.ORGANIZATION_MEMORY_MIB }}
      FRONT_HEALTH_CHECK_PATH: ${{ vars.FRONT_HEALTH_CHECK_PATH }}
      GATEWAY_HEALTH_CHECK_PATH: ${{ vars.GATEWAY_HEALTH_CHECK_PATH }}
      ACCOUNT_ACCESS_HEALTH_CHECK_PATH: ${{ vars.ACCOUNT_ACCESS_HEALTH_CHECK_PATH }}
      ORGANIZATION_HEALTH_CHECK_PATH: ${{ vars.ORGANIZATION_HEALTH_CHECK_PATH }}
      FRONT_IMAGE_URI: ${{ github.event.inputs.front_image_uri }}
      GATEWAY_IMAGE_URI: ${{ github.event.inputs.gateway_image_uri }}
      ACCOUNT_ACCESS_IMAGE_URI: ${{ github.event.inputs.account_access_image_uri }}
      ORGANIZATION_IMAGE_URI: ${{ github.event.inputs.organization_image_uri }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ env.INFRA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          allowed-account-ids: 902837199612
          role-session-name: ev-dashboard-ecs-infra-${{ github.run_id }}
          mask-aws-account-id: true
          unset-current-credentials: true
          retry-max-attempts: 4
          action-timeout-s: 120

      - name: Validate required config
        run: |
          set -euo pipefail

          required_vars=(
            INFRA_ROLE_ARN
            AWS_REGION
            HOSTED_ZONE_ID
            HOSTED_ZONE_NAME
            APEX_DOMAIN
            API_DOMAIN
            VPC_ID
            PUBLIC_SUBNET_IDS
            FRONT_IMAGE_URI
            GATEWAY_IMAGE_URI
            ACCOUNT_ACCESS_IMAGE_URI
            ORGANIZATION_IMAGE_URI
          )

          for key in "${required_vars[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required value: ${key}" >&2
              exit 1
            fi
          done

          if { [ "${ACCOUNT_ACCESS_DESIRED_COUNT:-0}" != "0" ] || [ "${ORGANIZATION_DESIRED_COUNT:-0}" != "0" ]; } && [ -z "${PRIVATE_SUBNET_IDS:-}" ]; then
            echo "Missing required value: PRIVATE_SUBNET_IDS" >&2
            exit 1
          fi

      - name: Run unit tests
        run: npm test -- --runInBand

      - name: Synthesize stack
        run: npx cdk synth

      - name: Deploy stack
        run: npx cdk deploy --require-approval never
